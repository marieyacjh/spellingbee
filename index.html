<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spelling Bee: Classroom Master</title>
    <style>
        :root {
            --honey-yellow: #fff9c4;
            --bee-yellow: #ffeb3b;
            --bee-black: #333333;
            --soft-white: #ffffff;
            --success-green: #4caf50;
        }

        body {
            font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE";
            background-color: var(--soft-white);
            color: var(--bee-black);
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* --- Animated Bees --- */
        .bee-container { position: absolute; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
        .mini-bee { 
            position: absolute; width: 30px; height: 25px; background: var(--bee-yellow); 
            border: 2px solid #000; border-radius: 50%; animation: wander 10s infinite linear;
        }
        .mini-bee::after { content: '翅'; color: transparent; position: absolute; top: -10px; left: 5px; width: 15px; height: 15px; background: rgba(255,255,255,0.7); border-radius: 50%; }
        
        @keyframes wander {
            0% { transform: translate(-50px, 100px) rotate(0deg); }
            25% { transform: translate(200px, 50px) rotate(20deg); }
            50% { transform: translate(500px, 150px) rotate(-10deg); }
            75% { transform: translate(800px, 50px) rotate(10deg); }
            100% { transform: translate(1100px, 100px) rotate(0deg); }
        }

        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; position: relative; z-index: 1; }
        .active { display: flex; }
        
        .btn {
            background-color: var(--bee-yellow); border: 4px solid var(--bee-black);
            border-radius: 20px; padding: 12px 30px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; margin: 10px; box-shadow: 0 5px 0 var(--bee-black);
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--bee-black); }
        .btn-next { background-color: var(--success-green); color: white; display: none; width: 80%; }

        /* --- Duel Layout --- */
        .duel-header { display: flex; width: 100%; justify-content: space-around; background: #eee; padding: 10px 0; border-bottom: 3px solid #333; }
        .score-box { text-align: center; font-size: 1.5rem; font-weight: bold; }
        .duel-container { display: flex; width: 100vw; height: 65vh; }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; border: 1px solid #ddd; padding: 10px; overflow-y: auto; }
        
        .display-area { font-size: 2.2rem; font-weight: bold; height: 50px; margin: 10px; border-bottom: 4px solid #333; text-align: center; min-width: 150px; }
        .keyboard { display: flex; flex-direction: column; align-items: center; transform: scale(0.85); }
        .kb-row { display: flex; justify-content: center; margin-bottom: 4px; }
        .key { min-width: 40px; height: 50px; margin: 2px; background: #fff; border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .key-active { background: var(--bee-yellow); }

        .setup-card { background: white; padding: 20px; border: 3px solid #333; border-radius: 15px; margin: 10px; width: 90%; max-width: 400px; }
        input { padding: 8px; border-radius: 8px; border: 2px solid #333; margin: 5px; width: 80%; }
        
        .slot { width: 45px; height: 55px; border: 2px dashed #999; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 2px; }
        .tile { width: 45px; height: 55px; background: var(--bee-yellow); border: 2px solid #333; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; margin: 3px; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active" style="background:#fffde7">
        <div class="bee-container">
            <div class="mini-bee" style="top:20%; animation-delay:0s"></div>
            <div class="mini-bee" style="top:50%; animation-delay:2s"></div>
            <div class="mini-bee" style="top:80%; animation-delay:5s"></div>
        </div>
        <h1>🐝 SPELLING BEE</h1>
        <button class="btn" onclick="openModeSelect('practice')">PRACTICE</button>
        <button class="btn" onclick="openModeSelect('duel')">TEAM DUEL</button>
        <button class="btn" onclick="showScreen('edit-screen')">EDIT LIST</button>
    </div>

    <div id="mode-screen" class="screen">
        <h2>CHOOSE STYLE</h2>
        <button class="btn" onclick="handleStyleSelection('unscramble')">UNSCRAMBLE</button>
        <button class="btn" onclick="handleStyleSelection('spell')">SPELL IT</button>
    </div>

    <div id="setup-screen" class="screen">
        <h2>TEAM SETUP</h2>
        <div class="setup-card">
            <h3>TEAM 1</h3>
            <input type="text" id="team1-name" value="TEAM A">
            <input type="text" id="team1-nums" placeholder="Student Nums (e.g. 1,2,3 or 1-20)">
        </div>
        <div class="setup-card">
            <h3>TEAM 2</h3>
            <input type="text" id="team2-name" value="TEAM B">
            <input type="text" id="team2-nums" placeholder="Student Nums (e.g. 1,2,3 or 1-20)">
        </div>
        <button class="btn" onclick="startDuelGame()">START DUEL ➔</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="display-area" id="p-display"></div>
        <div id="p-play"></div>
        <button id="next-btn-p" class="btn btn-next" onclick="nextWord()">NEXT WORD</button>
    </div>

    <div id="duel-screen" class="screen" style="padding:0">
        <div class="duel-header">
            <div class="score-box"><span id="t1-label">T1</span>: <span id="t1-score">0</span></div>
            <div class="score-box"><span id="t2-label">T2</span>: <span id="t2-score">0</span></div>
        </div>
        <div class="duel-container">
            <div class="team-side">
                <button class="btn" onclick="pickStudent('l')">PICK</button>
                <b id="num-l" style="font-size:2rem">-</b>
                <div id="l-play"></div>
            </div>
            <div class="team-side">
                <button class="btn" onclick="pickStudent('r')">PICK</button>
                <b id="num-r" style="font-size:2rem">-</b>
                <div id="r-play"></div>
            </div>
        </div>
        <button class="btn" onclick="speakWord()">📢 LISTEN</button>
        <button id="next-btn-duel" class="btn btn-next" onclick="nextWord()">NEXT WORD</button>
    </div>

    <div id="edit-screen" class="screen">
        <h2>EDIT WORDS</h2>
        <textarea id="word-input" rows="10" style="width:90%"></textarea>
        <button class="btn" onclick="saveWords()">SAVE</button>
    </div>

    <script>
        let currentWords = ["Honey Bee", "Great Job", "School"];
        let wordIndex = 0;
        let gameMode = 'practice';
        let gameStyle = 'spell';
        let scores = { t1: 0, t2: 0 };
        let teamData = { t1: { name: "", nums: [] }, t2: { name: "", nums: [] } };
        let isCaps = false;
        let isWaitingForNext = false;

        const qwerty = [["Q","W","E","R","T","Y","U","I","O","P"], ["A","S","D","F","G","H","J","K","L"], ["Z","X","C","V","B","N","M"]];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openModeSelect(mode) { gameMode = mode; showScreen('mode-screen'); }

        function handleStyleSelection(style) {
            gameStyle = style;
            if (gameMode === 'duel') showScreen('setup-screen');
            else startGame();
        }

        function parseNumbers(str) {
            if (str.includes('-')) {
                let parts = str.split('-').map(Number);
                let list = [];
                for (let i = parts[0]; i <= parts[1]; i++) list.push(i);
                return list;
            }
            return str.split(',').map(x => x.trim()).filter(x => x !== "");
        }

        function startDuelGame() {
            teamData.t1.name = document.getElementById('team1-name').value;
            teamData.t2.name = document.getElementById('team2-name').value;
            teamData.t1.nums = parseNumbers(document.getElementById('team1-nums').value);
            teamData.t2.nums = parseNumbers(document.getElementById('team2-nums').value);
            
            document.getElementById('t1-label').innerText = teamData.t1.name;
            document.getElementById('t2-label').innerText = teamData.t2.name;
            scores = { t1: 0, t2: 0 };
            updateScoreUI();
            startGame();
        }

        function startGame() {
            wordIndex = 0;
            isWaitingForNext = false;
            if (gameMode === 'duel') {
                showScreen('duel-screen');
                renderRound('l-play', 'l');
                renderRound('r-play', 'r');
            } else {
                showScreen('game-screen');
                renderRound('p-play', 'p');
            }
        }

        function pickStudent(side) {
            let list = side === 'l' ? teamData.t1.nums : teamData.t2.nums;
            if (list.length === 0) { document.getElementById('num-'+side).innerText = "?"; return; }
            let picked = list[Math.floor(Math.random() * list.length)];
            document.getElementById('num-' + side).innerText = picked;
        }

        function renderRound(containerId, side, clearDisplay = true) {
            const container = document.getElementById(containerId);
            const currentText = clearDisplay ? "" : (document.getElementById(side + "-display")?.innerText || "");
            container.innerHTML = '';
            const word = currentWords[wordIndex];

            if(gameStyle === 'spell') {
                const display = document.createElement('div');
                display.id = side + "-display"; display.className = "display-area";
                display.innerText = currentText;
                container.appendChild(display);
                renderKeyboard(container, side);
            } else {
                renderUnscramble(container, side, word);
            }
        }

        function renderUnscramble(container, side, word) {
            const targetDiv = document.createElement('div'); targetDiv.id = side + "-target";
            const poolDiv = document.createElement('div');
            
            word.split('').forEach(char => {
                let s = document.createElement('div');
                s.className = char === " " ? "slot space-slot" : "slot";
                s.innerText = char === " " ? " " : "";
                s.onclick = () => {
                    if (isWaitingForNext || !s.innerText || char === " ") return;
                    document.getElementById(s.dataset.tileId).style.visibility = "visible";
                    s.innerText = ""; s.style.background = "";
                };
                targetDiv.appendChild(s);
            });

            const letters = word.replace(/\s/g, '').split('').sort(() => Math.random() - 0.5);
            letters.forEach((l, i) => {
                let t = document.createElement('div');
                t.className = "tile"; t.id = side + "-t-" + i; t.innerText = l;
                t.onclick = () => {
                    if (isWaitingForNext) return;
                    let slots = targetDiv.querySelectorAll('.slot:not(.space-slot)');
                    for (let s of slots) {
                        if (!s.innerText) {
                            s.innerText = l; s.dataset.tileId = t.id;
                            s.style.background = "var(--bee-yellow)";
                            t.style.visibility = "hidden";
                            checkWin(side); break;
                        }
                    }
                };
                poolDiv.appendChild(t);
            });
            container.append(targetDiv, poolDiv);
        }

        function renderKeyboard(container, side) {
            const kb = document.createElement('div'); kb.className = "keyboard";
            qwerty.forEach(row => {
                const rowDiv = document.createElement('div');
                row.forEach(l => {
                    const k = document.createElement('div'); k.className = "key";
                    k.innerText = isCaps ? l : l.toLowerCase();
                    k.onclick = () => {
                        if (isWaitingForNext) return;
                        document.getElementById(side + "-display").innerText += k.innerText;
                        if(isCaps) { isCaps = false; renderRound(container.id, side, false); }
                        checkWin(side);
                    };
                    rowDiv.appendChild(k);
                });
                kb.appendChild(rowDiv);
            });
            // Controls
            const ctrl = document.createElement('div'); ctrl.className = "kb-row";
            const shift = document.createElement('div'); shift.className = "key " + (isCaps ? "key-active" : ""); shift.innerText = "SHIFT";
            shift.onclick = () => { isCaps = !isCaps; renderRound(container.id, side, false); };
            const del = document.createElement('div'); del.className = "key"; del.innerText = "DEL";
            del.onclick = () => { let d = document.getElementById(side + "-display"); d.innerText = d.innerText.slice(0,-1); };
            ctrl.append(shift, del); kb.appendChild(ctrl);
            container.appendChild(kb);
        }

        function checkWin(side) {
            let attempt = "";
            if (gameStyle === 'spell') {
                attempt = document.getElementById(side + "-display").innerText;
            } else {
                document.getElementById(side + "-target").childNodes.forEach(n => attempt += n.innerText);
            }

            if (attempt === currentWords[wordIndex]) {
                const points = currentWords[wordIndex].split(' ').filter(w => w !== "").length;
                if (gameMode === 'duel') {
                    if (side === 'l') scores.t1 += points; else scores.t2 += points;
                    updateScoreUI();
                }
                isWaitingForNext = true;
                document.getElementById('next-btn-p').style.display = 'block';
                document.getElementById('next-btn-duel').style.display = 'block';
            }
        }

        function updateScoreUI() {
            document.getElementById('t1-score').innerText = scores.t1;
            document.getElementById('t2-score').innerText = scores.t2;
        }

        function nextWord() {
            wordIndex++;
            isWaitingForNext = false;
            document.getElementById('next-btn-p').style.display = 'none';
            document.getElementById('next-btn-duel').style.display = 'none';
            if (wordIndex >= currentWords.length) { alert("GAME OVER!"); showScreen('menu-screen'); }
            else startGame();
        }

        function speakWord() {
            let u = new SpeechSynthesisUtterance(currentWords[wordIndex]);
            u.lang = 'en-US'; window.speechSynthesis.speak(u);
        }

        function saveWords() {
            currentWords = document.getElementById('word-input').value.split('\n').filter(x => x.trim());
            showScreen('menu-screen');
        }

        document.getElementById('word-input').value = currentWords.join('\n');
    </script>
</body>
</html>
